# ================================
# ROLLBACK DEPLOYMENT
# ================================
name: Rollback Deployment

on:
  workflow_dispatch:

jobs:
  rollback:
    runs-on: ubuntu-latest
    steps:
      - name: Rollback Application on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 2222 # Ensure this is your actual SSH port
          script: |
            cd /opt/vaultscribe/vaultscribe-secure-notes
            
            # Rollback previous commit
            git fetch --all
            git reset --hard HEAD~1
            
            # Restart containers safely
            docker compose down || true
            docker compose up -d --build
            
            # Laravel optimize (Added small sleep to ensure DB is up before optimizing)
            sleep 10
            docker exec vaultscribe php artisan optimize:clear
            
            # Fixed Post Deploy Health Check
            curl -I http://localhost:8000 || echo "Health check failed or service not responding yet"